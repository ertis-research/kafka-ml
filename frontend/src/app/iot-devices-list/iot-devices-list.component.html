<div class="container">
  <div class="header">
    <h1>Tasmota ML-Enabled IoT Devices</h1>
    <span class="spacer"></span>
    <a mat-fab color="accent" title="Add a new device" routerLink="/devices-create/">
      <mat-icon aria-label="add">add</mat-icon>
    </a>
  </div>

  <div class="table-container mat-elevation-z2">
    <div class="table-header">
      <mat-form-field>
        <input matInput (keyup)="applyFilter($event.target.value)" placeholder="Filter">
      </mat-form-field>
    </div>
    <mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="friendly_name">
        <mat-header-cell *matHeaderCellDef> Friendly Name </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.name}}">{{element.friendly_name}} </mat-cell>
      </ng-container>

      <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef> MQTT ID </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.token}}">{{element.token}} </mat-cell>
      </ng-container>

      <ng-container matColumnDef="broker">
        <mat-header-cell *matHeaderCellDef> MQTT Broker </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.broker}}"> {{element.mqtt_address}}:{{element.mqtt_port}} </mat-cell>
      </ng-container>

      <ng-container matColumnDef="backlog">
        <mat-header-cell *matHeaderCellDef> Configuration </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.backlog}}">
          <!-- Button to copy de content of backlog into clipboard -->
          <button mat-icon-button title="Copy configuration" (click)="copyToClipboard(element.backlog)">
            <mat-icon color="primary">content_copy</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef> Status </mat-header-cell>
        <mat-cell *matCellDef="let element">
          <mat-icon class="connected" *ngIf="element.status=='connected'">cloud_done</mat-icon>
          <mat-icon class="disconnected" *ngIf="element.status=='disconnected'">cloud_off</mat-icon>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="edit">
        <mat-header-cell *matHeaderCellDef> Edit </mat-header-cell>
        <mat-cell *matCellDef="let element">
          <a mat-icon-button title="View/edit device" routerLink="/device/{{ element.id }}">
            <mat-icon color="primary">edit</mat-icon>
          </a>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="delete">
        <mat-header-cell *matHeaderCellDef> Delete </mat-header-cell>
        <mat-cell *matCellDef="let element">
          <button mat-icon-button title="Delete device" (click)="deleteDialog(element.id, element.token)">
            <mat-icon color="primary">delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>

  </div>
</div>
