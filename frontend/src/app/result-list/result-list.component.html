<div class="container">
  <div class="header">
    <h1>Training results <a *ngIf="deploymentID!=null"> of Deployment {{deploymentID}}</a></h1>
    <span class="spacer"></span>
  </div>

  <div class="table-container mat-elevation-z2">
    <div class="table-header">
      <mat-form-field>
        <input matInput (keyup)="applyFilter($event.target.value)" placeholder="Filter">
      </mat-form-field>
    </div>
    <mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef> ID </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{ element.id}}"> {{ element.id}} </mat-cell>
      </ng-container>

      <ng-container matColumnDef="model">
        <mat-header-cell *matHeaderCellDef> Model </mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{ element.model.name}}"> {{ element.model.name}} </mat-cell>
      </ng-container>

        </ng-container>
        
        <ng-container matColumnDef="val_metrics">
          <mat-header-cell *matHeaderCellDef> Validation metrics </mat-header-cell>
          <mat-cell *matCellDef="let element" title="{{getLastMetric(element.val_metrics)}}"><div [innerHTML]="metricsToHTML(getLastMetric(element.val_metrics))"></div></mat-cell>
        </ng-container>

        <ng-container matColumnDef="test_metrics">
          <mat-header-cell *matHeaderCellDef> Test metrics </mat-header-cell>
          <mat-cell *matCellDef="let element" title="{{getLastMetric(element.test_metrics)}}"><div [innerHTML]="metricsToHTML(getLastMetric(element.test_metrics))"></div></mat-cell>
        </ng-container> -->

      <ng-container matColumnDef="metrics">
        <mat-header-cell *matHeaderCellDef> Metrics </mat-header-cell>
        <mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="openMetricsModal(element)">
            <mat-icon>info_outline</mat-icon>
          </button>
          <ng-template #metricsModal let-data>
            <h1 mat-dialog-title>Metrics</h1>
            <div mat-dialog-content>
              <h4 mat-dialog-subtitle>Training metrics</h4>
              <div [innerHTML]="metricsToHTML(getLastMetric(data.train_metrics))"></div>
              <br>
            </div>
            <div mat-dialog-content>
              <h4 mat-dialog-subtitle>Validation metrics</h4>
              <div [innerHTML]="metricsToHTML(getLastMetric(data.val_metrics))"></div>
              <br>
            </div>
            <div mat-dialog-content>
              <h4 mat-dialog-subtitle>Test metrics</h4>
              <div [innerHTML]="metricsToHTML(getLastMetric(data.test_metrics))"></div>
              <br>
            </div>
            <div mat-dialog-content>
              <h4 mat-dialog-subtitle>Training time</h4>
              <div>{{data.training_time}}</div>
              <br>
            </div>
          </ng-template>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef> Status</mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.status}}">
          <mat-icon class="created" *ngIf="element.status=='created'">create</mat-icon>
          <mat-icon class="deployed" *ngIf="element.status=='deployed'">input</mat-icon>
          <mat-icon class="stopped" *ngIf="element.status=='stopped'">stop</mat-icon>
          <mat-icon class="finished" *ngIf="element.status=='finished'">done</mat-icon>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="status_changed">
        <mat-header-cell *matHeaderCellDef> Last status change</mat-header-cell>
        <mat-cell *matCellDef="let element" title="{{element.status_changed}}"> {{element.status_changed}} </mat-cell>
      </ng-container>



      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
        <mat-cell *matCellDef="let element">
          <button mat-icon-button [matMenuTriggerFor]="menu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item title="Show metrics chart" routerLink="/results/chart/{{element.id}}/">
              <mat-icon>show_chart</mat-icon>
              <span>Chart</span>
            </button>
            <button mat-menu-item *ngIf="element.status=='finished'" title="Deploy it for Inference"
              routerLink="/results/inference/{{element.id}}/">
              <mat-icon>play_arrow</mat-icon>
              <span>Inference</span>
            </button>
            <button mat-menu-item *ngIf="element.status=='finished'" title="Deploy model on Tasmota device"
              routerLink="/results/inference-iot/{{element.id}}/">
              <mat-icon>settings_remote</mat-icon>
              <span>Deploy on IoT</span>
            </button>
            <button mat-menu-item *ngIf="element.status=='finished'" title="Download trained model"
              (click)="getTrainedModel(element.id)">
              <mat-icon>archive</mat-icon>
              <span>Download</span>
            </button>
            <button mat-menu-item *ngIf="element.status!='deployed'" title="Remove training"
              (click)="confirmDeletion(element.id)">
              <mat-icon>delete</mat-icon>
              <span>Remove</span>
            </button>
            <button mat-menu-item *ngIf="element.status=='deployed'" title="Stop training"
              (click)="confirmStopping(element.id)">
              <mat-icon>stop</mat-icon>
              <span>Stop</span>
            </button>
          </mat-menu>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
